<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vokabeln">
<meta name="theme-color" content="#1a1814">
<title>Vokabeltrainer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f0e8; --ink: #1a1814; --card-bg: #fffdf7;
  --accent: #c0392b; --accent2: #2c6e49; --muted: #8a8070; --border: #d4ccbc;
  --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
}
html,body { height:100%; overflow:hidden; }
body {
  font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink);
  display:flex; flex-direction:column; height:100vh; height:-webkit-fill-available;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse 60% 40% at 80% 10%,rgba(192,57,43,.07) 0%,transparent 70%),
              radial-gradient(ellipse 50% 50% at 10% 90%,rgba(44,110,73,.07) 0%,transparent 70%);
}

/* HEADER */
.app-header {
  padding:calc(var(--safe-top) + 14px) 20px 12px; text-align:center;
  border-bottom:1px solid var(--border); background:rgba(245,240,232,.94);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  position:relative; z-index:10; flex-shrink:0;
}
.eyebrow { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:2px; }
.app-header h1 { font-family:'Playfair Display',serif; font-size:1.45rem; font-weight:700; }
.app-header h1 em { font-style:italic; color:var(--accent); }

/* SCROLL */
.scroll-area { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; position:relative; z-index:1; }
.scroll-inner { padding:15px 13px 28px; }

/* BOTTOM NAV */
.bottom-nav {
  display:flex; background:rgba(245,240,232,.96);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--border); padding-bottom:var(--safe-bottom);
  flex-shrink:0; z-index:10; position:relative;
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:8px 2px; border:none; background:transparent; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-size:9px; font-weight:500;
  color:var(--muted); transition:color .2s; -webkit-tap-highlight-color:transparent;
}
.nav-btn .icon { font-size:20px; line-height:1; transition:transform .2s; }
.nav-btn.active { color:var(--ink); }
.nav-btn.active .icon { transform:scale(1.12); }

/* VIEWS */
.view { display:none; }
.view.active { display:block; }

/* ===== SEARCH TAB ===== */
.search-wrap { position:relative; margin-bottom:13px; }
.search-row { display:flex; gap:8px; }
.search-inp {
  flex:1; padding:11px 13px; border:1.5px solid var(--border); border-radius:12px;
  background:var(--card-bg); font-family:'DM Sans',sans-serif; font-size:16px;
  color:var(--ink); outline:none; transition:border-color .2s; -webkit-appearance:none;
}
.search-inp:focus { border-color:var(--accent); }
.search-btn {
  padding:0 16px; background:var(--ink); color:#fff; border:none; border-radius:12px;
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer;
  -webkit-tap-highlight-color:transparent; transition:background .15s; white-space:nowrap;
}
.search-btn:active { background:var(--accent); }

/* Autocomplete */
.ac-list {
  position:absolute; top:calc(100% + 4px); left:0; right:68px;
  background:var(--card-bg); border:1.5px solid var(--border); border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.12); z-index:200; display:none; overflow:hidden;
}
.ac-list.open { display:block; }
.ac-item {
  padding:10px 13px; font-size:15px; cursor:pointer;
  border-bottom:1px solid var(--border); -webkit-tap-highlight-color:transparent;
  transition:background .1s;
}
.ac-item:last-child { border-bottom:none; }
.ac-item:active { background:var(--bg); }
.ac-bold { font-weight:700; }

/* Word header in search results */
.word-header {
  background:var(--ink); color:#fff; border-radius:14px;
  padding:15px 16px 13px; margin-bottom:9px;
}
.word-title { font-family:'Playfair Display',serif; font-size:1.75rem; font-weight:700; }
.word-phonetic { font-family:'DM Mono',monospace; font-size:12px; opacity:.5; margin-top:3px; margin-bottom:9px; }
.audio-btn {
  display:inline-flex; align-items:center; gap:5px; padding:5px 12px;
  border-radius:20px; border:1.5px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.1); color:#fff; font-size:12px; font-weight:500;
  cursor:pointer; -webkit-tap-highlight-color:transparent;
}

/* Add all button */
.add-all-btn {
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; padding:12px; border-radius:12px; margin-bottom:10px;
  border:2px solid var(--accent2); background:#edf7f1; color:var(--accent2);
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700;
  cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent;
}
.add-all-btn:active { background:var(--accent2); color:#fff; }
.add-all-btn.added { background:var(--accent2); color:#fff; pointer-events:none; }

/* Meaning card in search */
.s-meaning {
  background:var(--card-bg); border:1.5px solid var(--border);
  border-radius:13px; padding:13px; margin-bottom:8px; animation:fadeUp .2s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.s-meaning-top { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.pos-badge {
  display:inline-block; padding:3px 9px; border-radius:20px;
  background:var(--bg); border:1px solid var(--border);
  font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1px;
  text-transform:uppercase; color:var(--muted); font-style:italic;
}
.s-de {
  font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:var(--ink);
  display:flex; align-items:center; gap:6px;
}
.s-de-loading { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:400; color:var(--muted); font-style:italic; }
.def-toggle {
  display:flex; align-items:center; gap:5px; width:100%; text-align:left;
  padding:6px 0 2px; border:none; background:none; color:var(--muted);
  font-size:12px; font-weight:500; cursor:pointer; -webkit-tap-highlight-color:transparent;
}
.def-toggle .arr { display:inline-block; transition:transform .2s; }
.def-toggle.open .arr { transform:rotate(90deg); }
.def-body { max-height:0; overflow:hidden; transition:max-height .28s ease; }
.def-body.open { max-height:180px; }
.def-inner { padding:6px 0 2px; font-size:13px; color:var(--muted); line-height:1.6; }
.def-example { margin-top:4px; font-style:italic; }
.def-example::before { content:'"'; } .def-example::after { content:'"'; }

.search-empty { text-align:center; padding:36px 16px; color:var(--muted); }
.search-empty .ei { font-size:42px; margin-bottom:10px; }
.search-empty p { font-size:14px; line-height:1.7; }
.search-error { padding:15px; border-radius:12px; background:#fdf0ef; border:1.5px solid #f5c6c3; color:var(--accent); font-size:14px; line-height:1.6; text-align:center; margin-bottom:10px; }

/* ===== MEINE VOKABELN TAB ===== */
.sort-row {
  display:flex; gap:6px; margin-bottom:13px; flex-wrap:wrap;
}
.sort-btn {
  padding:5px 12px; border-radius:20px; border:1.5px solid var(--border);
  background:var(--card-bg); font-family:'DM Sans',sans-serif; font-size:11px;
  font-weight:500; color:var(--muted); cursor:pointer; transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.sort-btn.active { background:var(--ink); color:#fff; border-color:var(--ink); }

/* Vocab entry card */
.v-card {
  background:var(--card-bg); border:1.5px solid var(--border);
  border-radius:14px; margin-bottom:9px; overflow:hidden;
  animation:fadeUp .2s ease;
}
.v-card-head {
  display:flex; align-items:center; gap:10px; padding:12px 13px;
  cursor:pointer; -webkit-tap-highlight-color:transparent;
}
.v-card-head:active { background:var(--bg); }
.v-en { font-weight:700; font-size:15px; flex:1; }
.v-de-short { color:var(--muted); font-style:italic; font-size:13px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.v-pct { font-family:'DM Mono',monospace; font-size:11px; min-width:28px; text-align:right; }
.pct-good { color:var(--accent2); } .pct-bad { color:var(--accent); } .pct-neu { color:var(--muted); }
.v-chevron { color:var(--muted); font-size:16px; transition:transform .2s; flex-shrink:0; }
.v-card.open .v-chevron { transform:rotate(90deg); }
.v-del { background:none; border:none; color:var(--border); font-size:20px; cursor:pointer; padding:0 3px; line-height:1; flex-shrink:0; -webkit-tap-highlight-color:transparent; }
.v-del:active { color:var(--accent); }
.v-phonetic-toggle {
  display:flex; align-items:center; gap:5px; width:100%; text-align:left;
  padding:8px 13px; border:none; background:var(--bg); color:var(--muted);
  font-size:12px; font-weight:500; cursor:pointer; border-top:1px solid var(--border);
  -webkit-tap-highlight-color:transparent;
}
.v-phonetic-toggle .arr { display:inline-block; transition:transform .2s; }
.v-phonetic-toggle.open .arr { transform:rotate(90deg); }
.v-phonetic-body { max-height:0; overflow:hidden; transition:max-height .25s ease; }
.v-phonetic-body.open { max-height:80px; }
.v-phonetic-inner {
  padding:10px 13px; display:flex; align-items:center; gap:12px;
  border-top:1px solid var(--border);
}
.v-phonetic-text { font-family:'DM Mono',monospace; font-size:14px; color:var(--muted); }
.v-audio-btn {
  display:inline-flex; align-items:center; gap:5px; padding:5px 13px;
  border-radius:20px; border:1.5px solid var(--border); background:var(--bg);
  color:var(--ink); font-size:12px; font-weight:500; cursor:pointer;
  -webkit-tap-highlight-color:transparent; transition:all .15s;
}
.v-audio-btn:active { background:var(--ink); color:#fff; border-color:var(--ink); }

/* Expanded content */
.v-body { max-height:0; overflow:hidden; transition:max-height .3s ease; }
.v-body.open { max-height:600px; }
.v-body-inner { padding:0 13px 13px; border-top:1px solid var(--border); }

.v-meaning {
  padding:10px 0; border-bottom:1px solid var(--border);
}
.v-meaning:last-child { border-bottom:none; }
.v-meaning-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.v-de-full { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; }
.v-def-toggle {
  display:flex; align-items:center; gap:4px; border:none; background:none;
  color:var(--muted); font-size:11px; cursor:pointer; padding:0;
  -webkit-tap-highlight-color:transparent;
}
.v-def-toggle .arr { display:inline-block; transition:transform .2s; }
.v-def-toggle.open .arr { transform:rotate(90deg); }
.v-def-body { max-height:0; overflow:hidden; transition:max-height .25s ease; }
.v-def-body.open { max-height:160px; }
.v-def-text { font-size:12px; color:var(--muted); line-height:1.6; padding:4px 0; }
.v-def-example { font-style:italic; margin-top:3px; }
.v-def-example::before{content:'"';} .v-def-example::after{content:'"';}
.v-def-item { padding:6px 0; border-bottom:1px dotted var(--border); }
.v-def-item:last-child { border-bottom:none; }
.def-num { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); font-weight:600; }

.vocabs-empty { text-align:center; padding:40px 16px; color:var(--muted); }
.vocabs-empty .ei { font-size:40px; margin-bottom:10px; }
.vocabs-empty p { font-size:14px; line-height:1.7; }

/* ===== TRAIN ===== */
.train-top { display:flex; gap:8px; align-items:center; margin-bottom:13px; }
.pill-btn {
  padding:6px 13px; border-radius:20px; border:1.5px solid var(--border);
  background:var(--card-bg); font-family:'DM Sans',sans-serif; font-size:12px;
  font-weight:500; color:var(--ink); cursor:pointer; transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.pill-btn.active-pill { background:var(--ink); color:#fff; border-color:var(--ink); }
.progress-wrap { height:3px; background:var(--border); border-radius:3px; margin-bottom:7px; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent2); border-radius:3px; transition:width .35s ease; }
.counter { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); text-align:center; margin-bottom:15px; }

/* FLASHCARD */
.train-panel {
  width:100%; min-height:200px; border-radius:20px; padding:24px 20px;
  display:flex; flex-direction:column; align-items:center;
  margin-bottom:16px;
}
.train-panel-front {
  background:var(--card-bg); border:2px solid var(--border);
  box-shadow:0 6px 22px rgba(0,0,0,.08); cursor:pointer;
}
.train-panel-back {
  background:var(--ink); border:2px solid var(--ink);
  box-shadow:0 6px 22px rgba(0,0,0,.13); color:#fff; cursor:pointer;
}
.train-panel-back .back-meanings { width:100%; }
.train-panel-back .back-meaning { padding:8px 0; border-bottom:1px solid rgba(255,255,255,.1); }
.train-panel-back .back-meaning:last-child { border-bottom:none; }
.train-panel-back .back-pos { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; opacity:.4; margin-bottom:3px; }
.train-panel-back .back-de { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; }
.card-scene { perspective:1000px; margin-bottom:16px; }
.card {
  width:100%; min-height:230px; position:relative; transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,.2,.2,1); -webkit-tap-highlight-color:transparent;
}
.card.flipped { transform:rotateY(180deg); }
.face {
  position:absolute; inset:0; min-height:230px; backface-visibility:hidden;
  -webkit-backface-visibility:hidden; border-radius:20px;
  display:flex; flex-direction:column; align-items:center; padding:22px 20px;
  overflow:hidden;
}
.face-front {
  background:var(--card-bg); border:2px solid var(--border);
  box-shadow:0 6px 22px rgba(0,0,0,.08); justify-content:flex-start; cursor:pointer;
}
.face-back {
  background:var(--ink); color:#fff; border:2px solid var(--ink);
  box-shadow:0 6px 22px rgba(0,0,0,.13); transform:rotateY(180deg);
  justify-content:flex-start; padding:22px 20px; cursor:pointer; overflow:hidden;
}
.face-lang { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:3px; text-transform:uppercase; opacity:.38; margin-bottom:8px; }
.face-word { font-family:'Playfair Display',serif; font-size:clamp(1.55rem,6vw,2.3rem); font-weight:700; line-height:1.2; text-align:center; }

/* Front: definition toggle */
.f-def-btn {
  display:flex; align-items:center; gap:5px; margin-top:14px;
  padding:7px 14px; border-radius:20px; border:1.5px solid var(--border);
  background:var(--bg); color:var(--muted); font-size:12px; font-weight:500;
  cursor:pointer; -webkit-tap-highlight-color:transparent; transition:all .15s;
}
.f-def-btn .arr { display:inline-block; transition:transform .2s; }
.f-def-btn.open .arr { transform:rotate(90deg); }
.f-def-area { max-height:0; overflow:hidden; transition:max-height .4s ease; width:100%; }
.f-def-area.open { max-height:400px; overflow-y:auto; }
.f-def-inner { margin-top:10px; padding:10px 12px; background:var(--bg); border-radius:10px; font-size:13px; color:var(--ink); line-height:1.6; text-align:left; width:100%; }
.f-def-eg { margin-top:4px; font-style:italic; }
.f-def-eg::before{content:'"';} .f-def-eg::after{content:'"';}
.f-def-item { padding:6px 0; border-bottom:1px dotted rgba(26,24,20,.12); text-align:left; font-size:13px; line-height:1.6; color:var(--ink); }
.f-def-item:last-child { border-bottom:none; padding-bottom:0; }
.f-def-num { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); display:block; margin-bottom:3px; }
.face-hint { font-size:11px; color:var(--muted); opacity:.45; margin-top:auto; padding-top:8px; }

/* Back: all meanings */
.back-meanings { width:100%; overflow-y:auto; flex:1; }
.back-meaning { padding:8px 0; border-bottom:1px solid rgba(255,255,255,.1); }
.back-meaning:last-child { border-bottom:none; }
.back-pos { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; opacity:.4; margin-bottom:3px; }
.back-de { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; }

.ans-btns { display:flex; gap:10px; }
.ans-btn {
  flex:1; padding:13px; border-radius:14px; border:2px solid;
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
  cursor:pointer; transition:all .15s; -webkit-tap-highlight-color:transparent;
}
.ans-btn.knew { background:#edf7f1; color:var(--accent2); border-color:var(--accent2); }
.ans-btn.knew:active { background:var(--accent2); color:#fff; }
.ans-btn.didnt { background:#fdf0ef; color:var(--accent); border-color:var(--accent); }
.ans-btn.didnt:active { background:var(--accent); color:#fff; }
.ans-btns.hidden { visibility:hidden; pointer-events:none; }
.card-placeholder { min-height:230px; border-radius:20px; border:2px dashed var(--border); display:flex; align-items:center; justify-content:center; padding:28px 18px; text-align:center; color:var(--muted); font-size:14px; line-height:1.65; margin-bottom:16px; }
.done-screen { text-align:center; padding:28px 14px; }
.done-screen h2 { font-family:'Playfair Display',serif; font-size:1.65rem; margin-bottom:6px; }
.done-score { font-family:'DM Mono',monospace; font-size:2.7rem; color:var(--accent2); margin:12px 0; line-height:1; }
.done-screen p { color:var(--muted); font-size:14px; line-height:1.6; margin-bottom:5px; }
.done-btns { display:flex; flex-direction:column; gap:9px; margin-top:16px; }
.done-btn { padding:13px; border-radius:12px; border:none; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.done-btn.primary { background:var(--ink); color:#fff; }
.done-btn.success { background:#edf7f1; color:var(--accent2); border:1.5px solid var(--accent2); }

/* Lang toggle */
.lang-toggle-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.lang-toggle {
  display:flex; align-items:center; gap:6px; padding:7px 14px;
  border-radius:20px; border:1.5px solid var(--border); background:var(--card-bg);
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer;
  -webkit-tap-highlight-color:transparent; transition:all .15s; color:var(--ink);
  white-space:nowrap;
}
.lang-toggle:active { background:var(--ink); color:#fff; border-color:var(--ink); }
.lang-toggle .swap { font-size:14px; }

/* ===== STATS ===== */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:16px; }
.stat-card { background:var(--card-bg); border:1.5px solid var(--border); border-radius:14px; padding:14px 12px; text-align:center; }
.stat-num { font-family:'Playfair Display',serif; font-size:1.85rem; font-weight:700; line-height:1; margin-bottom:4px; }
.stat-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.section-title { font-family:'Playfair Display',serif; font-size:1.05rem; margin:15px 0 9px; }
.rank-list { display:flex; flex-direction:column; gap:6px; }
.rank-item { display:flex; align-items:center; gap:9px; padding:10px 12px; background:var(--card-bg); border:1.5px solid var(--border); border-radius:11px; }
.rank-badge { font-family:'DM Mono',monospace; font-size:10px; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:600; }
.rb-good { background:#edf7f1; color:var(--accent2); }
.rb-bad { background:#fdf0ef; color:var(--accent); }
.rank-en { font-weight:600; font-size:13px; flex:1; }
.rank-de { color:var(--muted); font-style:italic; font-size:12px; }
.rank-n { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
.reset-btn { display:block; width:100%; margin-top:18px; padding:13px; border-radius:12px; border:1.5px solid var(--border); background:var(--card-bg); color:var(--accent); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; -webkit-tap-highlight-color:transparent; }
</style>
</head>
<body>

<div class="app-header">
  <div class="eyebrow">🇬🇧 ↔ 🇩🇪</div>
  <h1>Vokabel<em>trainer</em></h1>
</div>

<div class="scroll-area">
  <div class="scroll-inner">

    <!-- SUCHE -->
    <div id="view-search" class="view active">
      <div class="lang-toggle-row">
        <button class="lang-toggle" id="lang-toggle-btn" onclick="toggleLang()">
          <span id="lang-from">🇬🇧 EN</span>
          <span class="swap">⇄</span>
          <span id="lang-to">🇩🇪 DE</span>
        </button>
      </div>
      <div class="search-wrap">
        <div class="search-row">
          <input class="search-inp" id="search-inp" type="text"
            placeholder="Englisches Wort suchen…"
            autocomplete="off" autocorrect="off" spellcheck="false"
            oninput="onInput()" onkeydown="onKey(event)">
          <button class="search-btn" onclick="doSearch()">Suchen</button>
        </div>
        <div class="ac-list" id="ac-list"></div>
      </div>
      <div id="search-results">
        <div class="search-empty"><div class="ei">🔍</div><p>Gib ein englisches Wort ein,<br>um es nachzuschlagen.</p></div>
      </div>
    </div>

    <!-- MEINE VOKABELN -->
    <div id="view-vocabs" class="view">
      <div class="sort-row">
        <button class="sort-btn active" id="sort-en" onclick="setSort('en',this)">A–Z Englisch</button>
        <button class="sort-btn" id="sort-de" onclick="setSort('de',this)">A–Z Deutsch</button>
        <button class="sort-btn" id="sort-pos" onclick="setSort('pos',this)">Wortart</button>
        <button class="sort-btn" id="sort-new" onclick="setSort('new',this)">Neu zuerst</button>
      </div>
      <div id="vocabs-list"></div>
    </div>

    <!-- LERNEN -->
    <div id="view-train" class="view">
      <div class="train-top">
        <button class="pill-btn" id="btn-wrong" onclick="toggleWrongOnly()">Nur falsche</button>
        <button class="pill-btn" onclick="startSession()">↺ Neu mischen</button>
      </div>
      <div class="progress-wrap"><div class="progress-fill" id="prog" style="width:0%"></div></div>
      <div class="counter" id="counter"></div>
      <div id="train-area"></div>
    </div>

    <!-- STATISTIK -->
    <div id="view-stats" class="view">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="section-title">💪 Gut bekannte Wörter</div>
      <div class="rank-list" id="list-good"></div>
      <div class="section-title" style="margin-top:16px">🔁 Noch zu üben</div>
      <div class="rank-list" id="list-bad"></div>
      <button class="reset-btn" onclick="resetStats()">Statistik zurücksetzen</button>

    </div>

  </div>

  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-search" onclick="showView('search',this)">
    <span class="icon">🔍</span>Suchen
  </button>
  <button class="nav-btn" id="nav-vocabs" onclick="showView('vocabs',this)">
    <span class="icon">📚</span>Vokabeln
  </button>
  <button class="nav-btn" id="nav-train" onclick="showView('train',this)">
    <span class="icon">🃏</span>Lernen
  </button>
  <button class="nav-btn" id="nav-stats" onclick="showView('stats',this)">
    <span class="icon">📊</span>Statistik
  </button>
</nav>

<script>
// ---- DATA MODEL ----
// vocabs: { id, en, phonetic, meanings: [{pos, de, definition, example}], correct, wrong }
let vocabs = [], session = [], sessionIdx = 0, flipped = false;
let wrongOnly = false, wrongIds = new Set();
let sortMode = 'en';
let audioUrl = null, acTimer = null, searchLang = 'en';

function save() { localStorage.setItem('vt_v7', JSON.stringify(vocabs)); }
function load() { try { const d = localStorage.getItem('vt_v7'); if(d) vocabs = JSON.parse(d); } catch(e){} }

// ---- DEEPL API KEY MANAGEMENT ----
}



// ---- NAV ----
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
  closeAC();
  if(name==='vocabs') renderVocabs();
  if(name==='train') startSession();
  if(name==='stats') renderStats();
}
document.addEventListener('click', e=>{ if(!e.target.closest('.search-wrap')) closeAC(); });

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');}

load(); renderVocabs();
</script>
</body>
</html>
